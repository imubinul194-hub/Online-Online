<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Online | Marketing Agency</titltle>
  >
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <div class="logo">Online Online</div>
      <nav>
        <a href="#services">Services</a>
        <a href="#about">About</a>
        <a href="#process">Process</a>
        <a href="#contact" class="nav-cta">Contact</a>
      </nav>
    </div>

    <div class="container hero">
      <div class="hero-copy">
        <p class="eyebrow">Marketing agency for growing businesses</p>
        <h1>We help businesses grow through content, social media, and advertising.</h1>
        <p class="hero-text">
          Online Online helps business owners build a stronger online presence through content creation,
          social media management, paid promotion, and website content support.
        </p>
        <div class="hero-actions">
          <a href="#contact" class="btn btn-primary">Book a Free Consultation</a>
          <a href="#services" class="btn btn-secondary">Explore Services</a>
        </div>
      </div>

      <div class="hero-panel">
        <div class="panel-card">
          <span>What we help with</span>
          <h3>Visibility, trust, and customer engagement</h3>
          <p>We help your business show up clearly online and communicate better with customers.</p>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="section light" id="about">
      <div class="container split">
        <div>
          <p class="section-label">About</p>
          <h2>Support for business owners who want a stronger online presence.</h2>
        </div>
        <div>
          <p>
            Online Online is a marketing agency that helps businesses improve how they appear online through
            content creation, social media management, advertising support, and website content management.
          </p>
          <p>
            We focus on helping businesses communicate clearly, stay active online, and create better customer engagement.
          </p>
        </div>
      </div>
    </section>

    <section class="section" id="services">
      <div class="container">
        <p class="section-label">Services</p>
        <h2 class="section-heading">What we do</h2>

        <div class="services-grid">
          <article class="service-card">
            <div class="service-number">01</div>
            <h3>Social Media Management</h3>
            <p>We help you stay active, consistent, and professional across your social platforms.</p>
          </article>

          <article class="service-card">
            <div class="service-number">02</div>
            <h3>Paid Advertising</h3>
            <p>We support targeted promotion that helps your business reach the right audience.</p>
          </article>

          <article class="service-card">
            <div class="service-number">03</div>
            <h3>Content Creation</h3>
            <p>We create clear, engaging content that reflects your brand and speaks to customers.</p>
          </article>

          <article class="service-card">
            <div class="service-number">04</div>
            <h3>Website Content Management</h3>
            <p>We help keep your website updated, relevant, and aligned with your wider marketing efforts.</p>
          </article>
        </div>
      </div>
    </section>

    <section class="section dark">
      <div class="container benefits">
        <div>
          <p class="section-label">Why choose us</p>
          <h2>Clear communication, practical support, and marketing that feels manageable.</h2>
        </div>

        <div class="benefit-list">
          <div class="benefit-item">
            <h3>Friendly and approachable</h3>
            <p>We work in a way that feels clear, supportive, and easy to understand.</p>
          </div>
          <div class="benefit-item">
            <h3>Built for busy owners</h3>
            <p>We help take pressure off your online marketing so you can focus on running your business.</p>
          </div>
          <div class="benefit-item">
            <h3>Focused on trust</h3>
            <p>We help your business look more credible, active, and engaging online.</p>
          </div>
        </div>
      </div>
    </section>

    <section class="section light" id="process">
      <div class="container">
        <p class="section-label">Process</p>
        <h2 class="section-heading">How we work</h2>

        <div class="process-grid">
          <div class="process-step">
            <span>01</span>
            <h3>Understand your business</h3>
            <p>We learn about your goals, services, and target audience.</p>
          </div>

          <div class="process-step">
            <span>02</span>
            <h3>Create a practical plan</h3>
            <p>We shape a content and marketing approach around your business needs.</p>
          </div>

          <div class="process-step">
            <span>03</span>
            <h3>Support your online presence</h3>
            <p>We help manage your visibility, messaging, and customer communication.</p>
          </div>
        </div>
      </div>
    </section>

    <section class="section contact-band" id="contact">
      <div class="container contact-layout">
        <div class="contact-copy">
          <p class="section-label light-label">Contact</p>
          <h2>Let’s help your business grow online.</h2>
          <p>
            If you want help with social media, advertising, content creation, or website content management,
            send us a message and we’ll get back to you as soon as possible.
          </p>

          <div class="contact-info">
            <p><strong>Email:</strong> contact@onlineonlineltd.com</p>
            <p><strong>Phone:</strong> 07459930788</p>
          </div>
        </div>

        <div class="form-shell">
          <form action="https://formsubmit.co/contact@onlineonlineltd.com" method="POST" class="contact-form">
            <input type="hidden" name="_subject" value="New enquiry from Online Online website">
            <input type="hidden" name="_captcha" value="false">

            <div class="form-group">
              abel for="name">Your Name</label>
              <input type="text" id="name" name="name" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
              abel for="business">Business Name</label>
              <input type="text" id="business" name="business" placeholder="Enter your business name">
            </div>

            <div class="form-group">
              abel for="email">Your Email</label>
              <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
              abel for="message">Message</label>
              <textarea id="message" name="message" placeholder="Tell us how we can help" rows="6" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary form-btn">Send Message</button>
          </form>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
